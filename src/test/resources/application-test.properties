# In-memory DB for tests (no Docker). Production uses PostgreSQL + Flyway.
spring.datasource.url=jdbc:h2:mem:wee;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Tests use mocked OpenF1; keep at 0 so any real bean does not sleep in throttler.
wee.feeds.openf1.min-interval-ms=0

# Tests log to temp dir, not ./logs/wee.log (main application.properties sets that for runtime)
logging.file.name=${java.io.tmpdir}/wee-test.log
