# WEE - Winning Events Ensured
server.port=9080

# PostgreSQL (override via env e.g. in Docker)
spring.datasource.url=jdbc:postgresql://localhost:5432/wee
spring.datasource.username=wee
spring.datasource.password=wee
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# OpenF1 feed (optional override; default https://api.openf1.org)
# wee.feeds.openf1.base-url=https://api.openf1.org
# Stay under OpenF1's 3 req/s limit (parallel users share this JVM-wide throttle).
wee.feeds.openf1.min-interval-ms=334

spring.cache.type=caffeine
spring.cache.cache-names=openf1Sessions,openf1Drivers,openf1SessionResult
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=120s

# Logging: INFO to console; same lines also written under ./logs/ (see logging.file.name).
logging.level.root=INFO
logging.level.com.evandorou=INFO
logging.file.name=logs/wee.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=100MB
