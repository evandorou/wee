services:
  db:
    image: postgres:16-alpine
    container_name: wee-db
    environment:
      POSTGRES_DB: wee
      POSTGRES_USER: wee
      POSTGRES_PASSWORD: wee
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wee -d wee"]
      interval: 5s
      timeout: 5s
      retries: 5

  wee:
    image: com.evandorou/wee:0.1.0-SNAPSHOT
    container_name: wee
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9080:9080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/wee
      SPRING_DATASOURCE_USERNAME: wee
      SPRING_DATASOURCE_PASSWORD: wee
    # Optional: override OpenF1 base URL
    # WEE_FEEDS_OPENF1_BASE_URL: https://api.openf1.org
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--header=X-User-Id: healthcheck", "http://localhost:9080/api/v1/events"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
